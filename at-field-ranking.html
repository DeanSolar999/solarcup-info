<title>SOLAR CUP TWO ｜ 力場排行</title>
<meta property="og:title" content="曜日盃 TWO · 力場強度排行">
<meta property="og:description" content="九大球團力場擂台 · 復古 JRPG 天梯">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{--void:#03060d;--field:#22d3ee;--core:#eafcff;--ink:#dbeafe;--dim:#5b7089;--line:rgba(29,233,182,.16);
    /* JRPG 專屬 */
    --dq-bg:#0a0e2a;--dq-bg2:#141a44;--dq-frame:#f4f8ff;--dq-gold:#ffd24a;--dq-shadow:#05061a;
    --plat:#4d9fff;--gold:#ffcf33;--silver:#ff4d6a;--bronze:#34e07a}
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--dq-bg);color:var(--dq-frame);
    font-family:'DotGothic16','Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% 0%,rgba(60,80,200,.18),transparent 60%),
      repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0 2px,transparent 2px 4px);
    image-rendering:pixelated}
  /* 星空像素點 */
  #bg3d{position:fixed;inset:0;z-index:0;display:block}
  #cityline{position:fixed;left:0;right:0;bottom:0;height:min(22vh,190px);z-index:0;pointer-events:none;opacity:.55}
  #citysvg{width:100%;height:100%;display:block}
  #citysvg .bld{fill:none;stroke:#3a6ea5;stroke-width:1.1;stroke-linejoin:round;opacity:.6}
  #citysvg .bld.dim{stroke:#2a4d78;opacity:.4}
  #citysvg .grnd{stroke:rgba(120,160,220,.28);stroke-width:1}
  #citysvg .trail{fill:none;stroke:#7fe3ff;stroke-width:2;stroke-linecap:round;
    filter:drop-shadow(0 0 5px rgba(127,227,255,.9)) drop-shadow(0 0 10px rgba(127,227,255,.5))}
  .wrap{position:relative;z-index:2;max-width:960px;margin:0 auto;padding:22px 16px 90px}

  /* DQ 命令視窗框（雙線白框 + 深藍底 + 硬陰影）*/
  .dqbox{background:rgba(20,26,68,.62);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
    border:3px solid var(--dq-frame);border-radius:2px;
    box-shadow:0 0 0 3px var(--dq-shadow),4px 4px 0 3px var(--dq-shadow);position:relative}
  .dqbox::before{content:"";position:absolute;inset:3px;border:1px solid rgba(244,248,255,.35);pointer-events:none}
  .dqbox::after{content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      linear-gradient(var(--dq-gold) 0 100%),linear-gradient(var(--dq-gold) 0 100%),
      linear-gradient(var(--dq-gold) 0 100%),linear-gradient(var(--dq-gold) 0 100%);
    background-size:5px 5px;background-repeat:no-repeat;
    background-position:-3px -3px,calc(100% + 3px) -3px,-3px calc(100% + 3px),calc(100% + 3px) calc(100% + 3px);
    opacity:.9}

  header{text-align:center;margin:8px 0 20px}
  header .crest{font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:.1em;color:var(--dq-gold);margin-bottom:12px}
  header h1{font-family:'Press Start 2P',monospace;font-size:clamp(16px,4.6vw,30px);color:var(--dq-frame);line-height:1.4;
    text-shadow:3px 3px 0 var(--dq-shadow),0 0 12px rgba(120,150,255,.5)}
  header h1 .g{color:var(--dq-gold)}
  header .sub{font-family:'DotGothic16',monospace;font-size:12px;letter-spacing:.1em;color:#8fa2d8;margin-top:12px}

  /* 擂台區 */
  .arena{margin:20px 0;padding:18px 14px 10px;overflow:hidden}
  .arena .atitle{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--dq-gold);text-align:center;margin-bottom:18px;letter-spacing:.06em}
  .podium{display:flex;align-items:flex-end;justify-content:center;gap:3%;min-height:200px;flex-wrap:nowrap}
  .fighter{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .3s;position:relative}
  .fighter:hover{transform:translateY(-4px)}
  .fighter .spr{width:clamp(30px,7vw,52px);height:clamp(30px,7vw,52px);image-rendering:pixelated;
    animation:bob 1.6s ease-in-out infinite;position:relative}
  .fighter .spr::after{content:"";position:absolute;left:50%;bottom:-6px;width:70%;height:5px;
    background:radial-gradient(ellipse,rgba(0,0,0,.55),transparent 72%);transform:translateX(-50%);z-index:-1}
  .fighter:nth-child(2) .spr{animation-delay:.2s}.fighter:nth-child(3) .spr{animation-delay:.4s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .fighter .pedestal{background:
      repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0 1px,transparent 1px 7px),
      linear-gradient(180deg,rgba(120,150,255,.12),rgba(20,26,68,.72) 40%);
    border:2px solid var(--dq-frame);border-bottom:none;
    width:clamp(40px,9vw,68px);display:flex;align-items:flex-start;justify-content:center;padding-top:4px;
    font-family:'Press Start 2P',monospace;font-size:10px;color:var(--dq-gold);
    box-shadow:inset 0 0 0 1px var(--dq-shadow),inset 0 3px 6px rgba(0,0,0,.35)}
  .fighter .fname{font-family:'DotGothic16',monospace;font-size:11px;color:var(--dq-frame);margin-top:6px;white-space:nowrap}
  .fighter .fat{font-family:'Press Start 2P',monospace;font-size:8px;color:#8fa2d8;margin-top:3px}
  .fighter .fjob{font-family:'DotGothic16',monospace;font-size:9px;color:#6b7bb5;margin-top:1px}
  .fighter.champ .spr{filter:drop-shadow(0 0 8px var(--dq-gold))}
  .fighter .crown{position:absolute;top:-16px;image-rendering:pixelated;animation:bob 1.6s ease-in-out infinite}

  /* 排行命令視窗 */
  .board{margin-top:6px;padding:14px 14px 16px}
  .board .bt{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--dq-gold);margin-bottom:14px;text-align:center;letter-spacing:.06em}
  .entry{display:flex;align-items:center;gap:11px;padding:10px 10px;border-bottom:1px solid rgba(244,248,255,.14);
    position:relative;border-radius:2px}
  .entry:nth-child(even){background:rgba(255,255,255,.025)}
  .entry:last-child{border-bottom:none}
  .entry .er{font-family:'Press Start 2P',monospace;font-size:11px;color:#8fa2d8;min-width:22px;text-align:center;
    padding:3px 0;background:rgba(0,0,0,.28);border:1px solid rgba(244,248,255,.14);border-radius:2px}
  .entry.c1 .er{color:var(--dq-gold);border-color:rgba(255,210,74,.5);background:rgba(255,210,74,.12)}
  .entry.c2 .er{color:#d8dee9;border-color:rgba(216,222,233,.4);background:rgba(216,222,233,.08)}
  .entry.c3 .er{color:#ff9a6a;border-color:rgba(255,154,106,.4);background:rgba(255,154,106,.1)}
  .entry .esp{width:26px;height:26px;image-rendering:pixelated;flex-shrink:0;position:relative}
  .entry .esp::after{content:"";position:absolute;left:50%;bottom:-3px;width:65%;height:3px;
    background:radial-gradient(ellipse,rgba(0,0,0,.5),transparent 72%);transform:translateX(-50%);z-index:-1}
  .entry .enm{font-family:'DotGothic16',monospace;font-size:14px;color:var(--dq-frame);min-width:70px;
    display:flex;flex-wrap:wrap;align-items:baseline;column-gap:2px;row-gap:2px}
  .entry .ecode{font-size:9px;color:#6b7bb5;margin-left:5px}
  .entry .ejob{font-size:9px;color:#6b7bb5;opacity:.85;flex-basis:100%;margin-left:0}
  /* 像素能量條（方塊格）*/
  .hpbar{flex:1;display:flex;gap:2px;align-items:center;min-width:80px}
  .hpbar .cell{flex:1;height:12px;background:var(--dq-shadow);border:1px solid rgba(244,248,255,.2);max-width:16px}
  .hpbar .cell.on{background:var(--hpc,#4ade80);box-shadow:inset 0 0 0 1px rgba(255,255,255,.3)}
  .entry .eat{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--dq-gold);min-width:56px;text-align:right}
  .entry .emedal{position:absolute;left:20px;top:2px;image-rendering:pixelated;pointer-events:none}
  .entry .emedal.hop{animation:pixHop .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pixHop{0%{transform:translateY(0) scale(1)}35%{transform:translateY(-8px) scale(1.1,.9)}60%{transform:translateY(2px) scale(.92,1.08)}100%{transform:translateY(0)}}

  /* 底部訊息捲軸（DQ 對話框風）*/
  .msgbox{margin-top:18px;padding:14px 16px;font-family:'DotGothic16',monospace;font-size:13px;color:var(--dq-frame);
    line-height:1.7;min-height:66px}
  .msgbox .ms{color:var(--dq-gold)}
  .msgbox .arrow{display:inline-block;animation:blink 1s steps(1) infinite;color:var(--dq-gold)}
  @keyframes blink{50%{opacity:0}}

  footer{margin-top:24px;text-align:center;font-family:'DotGothic16',monospace;font-size:11px;color:#6b7bb5;line-height:1.9}
  footer .demo{color:#8fa2d8}

  /* 像素明細視窗 */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(3,4,20,.86);display:none;align-items:center;justify-content:center;padding:20px}
  .modal.show{display:flex;animation:mFade .18s steps(3)}
  @keyframes mFade{from{opacity:0}to{opacity:1}}
  .modal .mpanel{width:min(480px,94vw);max-height:88vh;overflow:auto;padding:20px}
  .modal .mhead{display:flex;align-items:center;gap:14px;padding-bottom:14px;border-bottom:2px solid rgba(244,248,255,.2);margin-bottom:14px}
  .modal .mhead .msp{width:44px;height:44px;image-rendering:pixelated}
  .modal .mhead .mn{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--dq-frame)}
  .modal .mhead .mc{font-family:'DotGothic16',monospace;font-size:11px;color:#8fa2d8;margin-top:5px}
  .modal .mx{position:absolute;top:14px;right:18px;font-family:'Press Start 2P',monospace;font-size:12px;color:var(--dq-gold);cursor:pointer}
  .munit{display:flex;align-items:center;gap:9px;font-family:'DotGothic16',monospace;font-size:12px;padding:6px 0;border-bottom:1px solid rgba(244,248,255,.08)}
  .munit .ut{padding:1px 7px;font-size:9px;font-family:'Press Start 2P',monospace}
  .munit .up{margin-left:auto;color:var(--dq-gold);font-family:'Press Start 2P',monospace;font-size:9px}
  .ut-p{color:var(--plat)}.ut-g{color:var(--gold)}.ut-s{color:var(--silver)}.ut-b{color:var(--bronze)}

  /* 火把 */
  .torch{position:absolute;top:8px;width:30px;height:64px;image-rendering:pixelated;pointer-events:none;
    filter:drop-shadow(0 0 9px rgba(255,150,50,.55))}
  .torch.tl{left:10px}.torch.tr{right:10px}
  @media(max-width:560px){.torch{width:22px;height:48px}}
  /* 傷害數字 */
  .dmg{position:absolute;left:50%;top:-4px;transform:translateX(-50%);font-family:'Press Start 2P',monospace;
    font-size:11px;pointer-events:none;z-index:50;text-shadow:2px 2px 0 var(--dq-shadow);white-space:nowrap;
    animation:dmgUp 1.05s ease-out forwards}
  .dmg.minus{animation:dmgDn 1.05s ease-in forwards}
  @keyframes dmgUp{0%{opacity:0;margin-top:0}15%{opacity:1}100%{opacity:0;margin-top:-34px}}
  @keyframes dmgDn{0%{opacity:0;margin-top:0}15%{opacity:1}100%{opacity:0;margin-top:24px}}
  /* 攻擊/受擊 */
  .spr.atk,.esp.atk{animation:atkFx .5s ease-out}
  @keyframes atkFx{0%{transform:translateX(0)}30%{transform:translateX(9px)}48%{transform:translateX(9px);filter:brightness(2.2)}100%{transform:translateX(0)}}
  .spr.hit,.esp.hit{animation:hitFx .55s}
  @keyframes hitFx{0%{filter:none}12%{filter:brightness(2.2) sepia(1) hue-rotate(-55deg) saturate(7)}25%{transform:translateX(-6px)}45%{transform:translateX(4px)}70%{transform:translateX(-2px)}100%{transform:translateX(0);filter:none}}
  /* 能量條逐格填充 */
  .cell.pop{animation:cellIn .22s both}
  @keyframes cellIn{from{transform:scaleY(.1);opacity:0}to{transform:scaleY(1);opacity:1}}
  /* 點擊釋放技能 */
  .spr,.esp{position:relative;cursor:pointer}
  .spr.cast,.esp.cast{animation:castFx .6s ease-out}
  @keyframes castFx{0%{filter:brightness(1) saturate(1);transform:scale(1)}
    30%{filter:brightness(2.6) saturate(2.2);transform:scale(1.22)}
    55%{filter:brightness(1.8) saturate(1.6);transform:scale(1.08)}
    100%{filter:brightness(1) saturate(1);transform:scale(1)}}
  /* 突然放大(爆氣/火焰類專用,幅度更誇張) */
  .spr.castBig,.esp.castBig{animation:castBigFx .62s ease-out}
  @keyframes castBigFx{0%{filter:brightness(1) saturate(1);transform:scale(1) rotate(0)}
    32%{filter:brightness(2.8) saturate(2.4);transform:scale(1.6) rotate(-5deg)}
    58%{filter:brightness(2) saturate(1.8);transform:scale(1.22) rotate(3deg)}
    100%{filter:brightness(1) saturate(1);transform:scale(1) rotate(0)}}
  /* 消失閃現(幽靈類專用:瞬間隱身→位移→閃回) */
  .spr.blink,.esp.blink{animation:blinkFx .58s steps(1) forwards}
  @keyframes blinkFx{0%{opacity:1;transform:scale(1) translateX(0)}
    16%{opacity:0;transform:scale(.55) translateX(7px)}
    34%{opacity:0;transform:scale(.55) translateX(-7px)}
    52%{opacity:1;transform:scale(1.4) translateX(0);filter:brightness(2.6)}
    72%{opacity:1;transform:scale(.9);filter:brightness(1.4)}
    100%{opacity:1;transform:scale(1);filter:brightness(1)}}
  /* 電光閃爍(星羽浮游獸專用:高頻閃爍) */
  .spr.flicker,.esp.flicker{animation:flickerFx .4s steps(3) forwards}
  @keyframes flickerFx{0%,100%{opacity:1;filter:brightness(1)}
    20%{opacity:.25;filter:brightness(3)}40%{opacity:1}
    60%{opacity:.35;filter:brightness(3)}80%{opacity:1}}
  .skillname{position:absolute;left:50%;top:-6px;transform:translateX(-50%);
    font-family:'Press Start 2P',monospace;font-size:10px;white-space:nowrap;pointer-events:none;z-index:70;
    text-shadow:2px 2px 0 var(--dq-shadow),0 0 9px currentColor;animation:skillPop .95s ease-out forwards}
  /* 施招震屏(容器級,讓招式更有打擊感) */
  .fxshake{animation:fxShake .42s linear}
  @keyframes fxShake{0%,100%{transform:translate(0,0)}18%{transform:translate(-3px,1px)}
    36%{transform:translate(3px,-2px)}54%{transform:translate(-3px,-1px)}
    72%{transform:translate(3px,1px)}88%{transform:translate(-1px,0)}}
  @keyframes skillPop{0%{opacity:0;transform:translateX(-50%) translateY(6px) scale(.7)}
    18%{opacity:1;transform:translateX(-50%) translateY(-4px) scale(1.08)}
    72%{opacity:1;transform:translateX(-50%) translateY(-16px) scale(1)}
    100%{opacity:0;transform:translateX(-50%) translateY(-28px) scale(.94)}}
  .spark{position:absolute;left:50%;top:50%;width:3px;height:3px;pointer-events:none;z-index:65;
    animation:sparkOut .5s ease-out forwards}
  @keyframes sparkOut{0%{opacity:1;transform:translate(-50%,-50%) translate(0,0)}
    100%{opacity:0;transform:translate(-50%,-50%) translate(var(--dx),var(--dy))}}
  .castring{position:absolute;left:50%;top:50%;width:6px;height:6px;border-radius:50%;
    transform:translate(-50%,-50%);pointer-events:none;z-index:64;animation:ringOut .55s ease-out forwards}
  @keyframes ringOut{0%{opacity:.95;box-shadow:0 0 0 0 currentColor}100%{opacity:0;box-shadow:0 0 0 28px transparent}}
  /* 專屬技能特效(九隻各異) */
  .flame{position:absolute;bottom:22%;left:50%;width:7px;height:13px;pointer-events:none;z-index:66;
    border-radius:50% 50% 45% 45%/65% 65% 35% 35%;animation:flameUp .58s ease-out forwards}
  @keyframes flameUp{0%{opacity:0;transform:translate(-50%,0) scale(calc(var(--fs,1)*.5))}
    22%{opacity:1;transform:translate(-50%,-7px) scale(calc(var(--fs,1)*1.25))}
    100%{opacity:0;transform:translate(-50%,-40px) scale(calc(var(--fs,1)*.4))}}
  .bolt{position:absolute;left:50%;top:8%;pointer-events:none;z-index:67;
    animation:boltFlash .32s steps(2) forwards}
  @keyframes boltFlash{0%{opacity:0}20%{opacity:1}50%{opacity:.15}72%{opacity:1}100%{opacity:0}}
  .auraline{position:absolute;left:50%;bottom:8%;width:3px;height:16px;background:currentColor;
    pointer-events:none;z-index:63;border-radius:2px;opacity:.9;animation:auraRise .55s ease-out forwards;
    box-shadow:0 0 6px currentColor}
  @keyframes auraRise{0%{transform:translate(-50%,0) scaleY(.3);opacity:0}
    30%{opacity:1}100%{transform:translate(-50%,-44px) scaleY(1.5);opacity:0}}
  .ripple{position:absolute;left:50%;top:55%;border:2px solid currentColor;border-radius:50%;
    transform:translate(-50%,-50%);pointer-events:none;z-index:62;opacity:.8;animation:rippleOut .6s ease-out forwards}
  @keyframes rippleOut{0%{width:4px;height:4px;opacity:.9}100%{width:58px;height:58px;opacity:0}}
  .pow{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);pointer-events:none;z-index:68;
    font-family:'Press Start 2P',monospace;font-size:11px;color:#fff;text-shadow:2px 2px 0 var(--dq-shadow),0 0 8px rgba(255,255,255,.7);
    animation:powHit .34s ease-out forwards}
  @keyframes powHit{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-8deg)}
    38%{opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(4deg)}
    100%{opacity:0;transform:translate(-50%,-68%) scale(.9) rotate(0)}}
  .ghost{position:absolute;inset:0;pointer-events:none;z-index:60;opacity:.55;mix-blend-mode:screen;
    animation:ghostFade .5s ease-out forwards}
  @keyframes ghostFade{0%{opacity:.6;filter:blur(0)}100%{opacity:0;filter:blur(1.2px)}}
  .glit{position:absolute;left:50%;top:42%;width:2px;height:2px;border-radius:50%;pointer-events:none;z-index:64;
    animation:glitDrift .85s ease-out forwards}
  @keyframes glitDrift{0%{opacity:0;transform:translate(-50%,-50%) translate(0,0)}
    16%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) translate(var(--dx),var(--dy))}}
  .powder{position:absolute;left:50%;top:48%;width:5px;height:5px;border-radius:50%;pointer-events:none;z-index:61;
    background:radial-gradient(circle,rgba(255,255,255,.95),rgba(255,255,255,.15) 70%,transparent);
    filter:blur(.4px);animation:powderDrift 1.05s ease-out forwards}
  @keyframes powderDrift{0%{opacity:0;transform:translate(-50%,-50%) translate(0,0) scale(.5)}
    18%{opacity:.85}
    100%{opacity:0;transform:translate(-50%,-50%) translate(var(--dx),var(--dy)) scale(2.2)}}
  .moonring{position:absolute;left:50%;top:50%;width:8px;height:8px;border:1.5px solid #cfe3ff;border-radius:50%;
    transform:translate(-50%,-50%);pointer-events:none;z-index:63;opacity:.8;animation:moonRise .8s ease-out forwards}
  @keyframes moonRise{0%{transform:translate(-50%,-50%) scale(.6);opacity:.9}
    100%{transform:translate(-50%,-150%) scale(1.6);opacity:0}}
  /* 月光飄浮專用:消失→殘影→現身閃光 */
  .spr.moonBlink,.esp.moonBlink{animation:moonBlinkFx .82s ease-out forwards}
  @keyframes moonBlinkFx{0%{opacity:1;transform:scale(1) translateY(0)}
    16%{opacity:0;transform:scale(.72) translateY(-5px)}
    46%{opacity:0;transform:scale(.72) translateY(-11px)}
    58%{opacity:1;transform:scale(1.32) translateY(-6px);filter:brightness(2.6)}
    78%{opacity:1;transform:scale(.94) translateY(-1px);filter:brightness(1.3)}
    100%{opacity:1;transform:scale(1) translateY(0);filter:brightness(1)}}
  .ghost.moonghost{animation:moonGhostFade .6s ease-out forwards}
  @keyframes moonGhostFade{0%{opacity:.5;transform:translateY(0)}100%{opacity:0;transform:translateY(var(--gy,-9px))}}
  .sparkle{position:absolute;left:50%;top:50%;width:7px;height:7px;pointer-events:none;z-index:69;
    transform:translate(-50%,-50%);animation:sparklePop .5s ease-out forwards}
  .sparkle::before,.sparkle::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 42%,#fff 42%,#fff 58%,transparent 58%)}
  .sparkle::after{transform:rotate(90deg)}
  @keyframes sparklePop{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(0deg)}
    32%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(50deg)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(95deg)}}
  /* LV 等級 */
  .elv{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--dq-gold);margin-left:6px;vertical-align:2px}
  /* 團寵三階進化:分階體型／成熟光暈(軸=力場峰值;img 用真素材時不套縮放) */
  .spr>svg,.esp>svg{transform:scale(var(--evoS,1));transform-origin:50% 100%;transition:transform .35s ease}
  .spr.evo1{--evoS:.72}.spr.evo2{--evoS:.9}.spr.evo3{--evoS:1.08}
  .esp.evo1{--evoS:.82}.esp.evo2{--evoS:.94}.esp.evo3{--evoS:1.06}
  .spr.evo3>svg,.esp.evo3>svg{filter:drop-shadow(0 0 2px rgba(255,255,255,.55))}
  .spr.evo3>img,.esp.evo3>img{filter:drop-shadow(0 0 3px rgba(255,255,255,.5))}
  /* 進化爆閃 */
  .evoflash{position:absolute;inset:-35%;pointer-events:none;z-index:75;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.95),rgba(180,220,255,.5) 45%,transparent 70%);
    animation:evoFlash .9s ease-out forwards}
  @keyframes evoFlash{0%{opacity:0;transform:scale(.2)}28%{opacity:1;transform:scale(1.05)}100%{opacity:0;transform:scale(1.7)}}
  /* 進化階徽章 */
  .estage{font-family:'DotGothic16',monospace;font-size:9px;margin-left:6px;padding:0 5px;border-radius:2px;
    border:1px solid rgba(244,248,255,.25);color:#8fa2d8;vertical-align:1px}
  .estage.s2{color:#8fd3ff;border-color:rgba(143,211,255,.4)}
  .estage.s3{color:var(--dq-gold);border-color:rgba(255,210,74,.5);background:rgba(255,210,74,.1)}
  /* ===== TEMP 團寵進化測試拉桿樣式 — 導入資料庫後整段刪除 ===== */
  .evo-test{position:fixed;left:10px;top:10px;z-index:90;width:min(300px,86vw);
    font-family:'DotGothic16',monospace;background:rgba(10,14,42,.94);border:2px solid var(--dq-gold);
    border-radius:4px;box-shadow:4px 4px 0 var(--dq-shadow);color:var(--dq-frame)}
  .evo-test-h{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--dq-gold);padding:8px 10px;
    display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,210,74,.3)}
  .evo-test-x{cursor:pointer;padding:0 4px}
  .evo-test-b{padding:8px 10px;max-height:min(60vh,420px);overflow:auto}
  .evo-test-sim{display:flex;align-items:center;gap:6px;font-size:11px;color:#8fd3ff;margin-bottom:6px}
  .evo-test-note{font-size:10px;color:#6b7bb5;line-height:1.5;margin-bottom:8px}
  .evo-row{display:flex;align-items:center;gap:8px;padding:4px 0}
  .evo-row-n{font-size:12px;min-width:42px;white-space:nowrap}
  .evo-slider{flex:1;min-width:70px;accent-color:var(--dq-gold)}
  .evo-row-v{font-size:10px;text-align:right;min-width:52px;display:flex;flex-direction:column;line-height:1.2}
  .evo-row-v .evo-val{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--dq-frame)}
  .evo-row-s{font-size:10px;color:#8fa2d8}
  @media(max-width:560px){.evo-test{width:min(240px,74vw)}}

      const lastY=ROWS[ROWS.length-1].y;

    const rects=[];
    // 黑色像素外框(整輪廓外擴1格,最底層先畫→讓生物輪廓在深色背景上跳出)
    ROWS.forEach(r=>{

      rects.push(R(x0-1,r.y,r.w+2,1,'#050714'));

  // 真實素材路徑接口:九個位置對應九球團(依 TEAMS 順序)。上傳真圖後填入即生效。
  const REAL_ART=[null,null,null,null,null,null,null,null,null];
  function resolveExtra(rects,baseHex){

    // ── Tuxemon 三階進化素材(base64 內嵌於 SC2_ART;CC-BY-SA 3.0)────────

    if(REAL_ART[idx]){
      return `<img src="${REAL_ART[idx]}" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated" alt="${CLASSES[idx%CLASSES.length].names[stg-1]}">`;
    }
    // ── 手刻 SVG 版本(九種專屬身形,目前使用中)───────────────────────
    // 分階顯現:幼體=軀體暗沉、無配件;成長體=一半配件、正常色;成熟體=全配件
    // 待機動畫:雙幀逐格切換(幀B=呼吸下沉,同火把 discrete 技法),每隻節奏錯開

      }
    },
    aura(el,c){ // 角龍小蜥·怒氣爆發:氣場線條竄升(配合突然放大)
      for(let i=0;i<14;i++){
        const a=document.createElement('span');a.className='auraline';a.style.color=c;

    wave(el,c){ // 龜殼水獸·甲殼衝浪:同心水紋

    combo(el,c){ // 狸獸拳士·連環貍拳:連續拳擊字樣

      }
    },
    phantom(el,c){ // 雙眼幽靈·幻影搖晃:消失閃現+殘影分身
      const inner=el.innerHTML;
      [-14,14,0].forEach((dx,i)=>{
        const g=document.createElement('div');g.className='ghost';g.innerHTML=inner;

    dust(el,c){ // 發光飛蛾·鱗粉亂舞:緩緩飄散的鱗粉＋周圍白色粉末煙霧
      for(let i=0;i<16;i++){

      // ①殘影(消失瞬間留下兩道漸淡分身,向上飄散)

  // ===== 傷害數字 =====
  function spawnDmg(el,d){
    const s=document.createElement('span');
    s.className='dmg'+(d<0?' minus':'');
    s.textContent=(d>0?'+':'')+d;
    s.style.color=d>=0?'#f4f8ff':'#ff6a6a';
    el.appendChild(s);
    setTimeout(()=>{if(s.parentNode)s.parentNode.removeChild(s);},1150);
  }

  // ===== 明細視窗 =====
  const modal=document.getElementById('modal'),mpanel=document.getElementById('mpanel');
  function openModal(t){
    const sorted=[...TEAMS].sort((a,b)=>b.field-a.field);const rk=sorted.indexOf(t)+1;
    const units=t.units.map(u=>`<div class="munit"><span>${u.id}</span>

    mpanel.innerHTML=`<span class="mx" id="mx">✕ CLOSE</span>
      <div class="mhead"><span class="msp">${t.spr}</span>
        <div><div class="mn" style="color:${t.c}">${t.name}</div>
        <div class="mc">${t.job.names[t.stage-1]} · ${t.code} · LV.${lv(t)} · ${STAGE_NAMES[t.stage]} · 排名 第 ${rk} 名 · 力場 ${t.field} AT</div></div></div>

      ${units}
      <div style="margin-top:12px;font-family:DotGothic16;font-size:12px;color:#8fa2d8">力場強度 ＝ 10 隊積分加總（底分＋名次分）</div>`;
    modal.classList.add('show');
    document.getElementById('mx').onclick=()=>modal.classList.remove('show');
  }
  modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('show');});

  // ===== 訊息捲軸 =====
  const msgbox=document.getElementById('msgbox');
  const MSGS=['勇者們的力場正在共鳴…','戰鬥開始！','某隊的力場突破天際！','擂台上塵土飛揚…','冠軍寶座易主？！','力場能量持續上升！'];
  function msg(txt){msgbox.innerHTML=`<span class="ms">＊</span> ${txt}<span class="arrow">▼</span>`;}

  if(window.SC2_ART||REAL_ART.some(x=>x)){const ac=document.getElementById('artCredit');if(ac)ac.style.display='inline';}
  render();

  // ===== 進化演出:白光爆閃 + 訊息軸宣告 =====
  function fieldTarget(code){
    const f=podiumEl.querySelector(`.fighter[data-code="${code}"]`);
    return f||entriesEl.querySelector(`.entry[data-code="${code}"]`);
  }
  function playEvolve(t){
    const target=fieldTarget(t.code);if(!target)return;
    const spr=target.querySelector('.spr')||target.querySelector('.esp');
    if(spr){
      const fl=document.createElement('div');fl.className='evoflash';spr.appendChild(fl);
      setTimeout(()=>{if(fl.parentNode)fl.parentNode.removeChild(fl);},900);
      spr.classList.remove('castBig');void spr.offsetWidth;spr.classList.add('castBig');
      setTimeout(()=>spr.classList.remove('castBig'),700);
    }
    msg(`⚡ <span style="color:${t.c}">${t.name}</span> 的團寵進化成 <span style="color:var(--dq-gold)">${STAGE_NAMES[t.stage]}</span>！`);
  }

  // 模擬力場波動 + 攻擊/受擊 + 傷害數字 + 高水位進化
  setInterval(()=>{
    if(window.__EVO_FREEZE)return;           // TEMP測試拉桿:凍結自動模擬時暫停
    const t=TEAMS[Math.floor(Math.random()*TEAMS.length)];
    t.prev=t.field;const d=Math.floor((Math.random()-.35)*80);
    t.field=Math.max(400,t.field+d);
    const before=t.stage;
    if(t.field>t.peak){t.peak=t.field;refreshSprite(t);}   // 高水位單向:只有創新高才可能進化
    render(t.code);
    const target=fieldTarget(t.code);
    if(target&&d!==0){
      const spr=target.querySelector('.spr')||target.querySelector('.esp');
      if(spr){spr.classList.add(d>0?'atk':'hit');setTimeout(()=>spr.classList.remove('atk','hit'),620);}
      spawnDmg(target,d);
    }
    if(t.stage>before)playEvolve(t);
    else if(Math.abs(d)>20)msg(`<span style="color:${t.c}">${t.name}</span> 的力場${d>0?'上升':'下降'} ${Math.abs(d)} 點！`);
    else msg(MSGS[Math.floor(Math.random()*MSGS.length)]);
  },3200);

  /* ===== TEMP 團寵進化測試拉桿 — 導入資料庫後整段刪除 =====
     (刪除範圍:此整段 JS + CSS 內 .evo-test* 區塊 + setInterval 起頭的 __EVO_FREEZE 判斷) */
  function buildEvoTestPanel(){
    window.__EVO_FREEZE=true;                 // 預設凍結自動模擬,拉桿測試才穩定
    const wrap=document.createElement('div');wrap.className='evo-test';
    wrap.innerHTML=`<div class="evo-test-h"><span>🎚 團寵進化測試台</span><span class="evo-test-x" id="evoTestX">－</span></div>
      <div class="evo-test-b" id="evoTestB">
        <label class="evo-test-sim"><input type="checkbox" id="evoSim"> 開啟自動模擬</label>
        <div class="evo-test-note">拖曳分數即時預覽三階；跨門檻 800／1600 播進化。<br>此面板僅供手動確認,導入資料庫後移除。</div>
        <div id="evoRows"></div>
      </div>`;
    document.body.appendChild(wrap);
    document.getElementById('evoRows').innerHTML=TEAMS.map(t=>`<div class="evo-row" data-code="${t.code}">
      <span class="evo-row-n" style="color:${t.c}">${t.name}</span>
      <input type="range" min="0" max="2400" step="20" value="${t.field}" class="evo-slider">
      <span class="evo-row-v"><b class="evo-val">${t.field}</b><span class="evo-row-s">${STAGE_NAMES[t.stage]}</span></span>
    </div>`).join('');
    wrap.querySelectorAll('.evo-row').forEach(row=>{
      const t=TEAMS.find(x=>x.code===row.dataset.code);
      const sld=row.querySelector('.evo-slider'),val=row.querySelector('.evo-val'),sb=row.querySelector('.evo-row-s');
      sld.addEventListener('input',()=>{
        const v=+sld.value,before=t.stage;
        t.prev=t.field;t.field=v;t.peak=v;refreshSprite(t);   // 測試:峰值跟拉桿雙向,方便預覽每一階
        val.textContent=v;sb.textContent=STAGE_NAMES[t.stage];
        sb.style.color=t.stage>=3?'var(--dq-gold)':t.stage===2?'#8fd3ff':'#8fa2d8';
        render(t.code);
        if(t.stage>before)playEvolve(t);
      });
    });
    document.getElementById('evoSim').addEventListener('change',e=>{window.__EVO_FREEZE=!e.target.checked;});
    document.getElementById('evoTestX').addEventListener('click',()=>{
      const b=document.getElementById('evoTestB'),x=document.getElementById('evoTestX'),hide=b.style.display!=='none';
      b.style.display=hide?'none':'block';x.textContent=hide?'＋':'－';
    });
  }
  buildEvoTestPanel();
  /* ===== /TEMP 團寵進化測試拉桿 ===== */
})();
</script>

/* 背景光子流（青） */
(function(){
  if(!window.THREE)return;
  const mobile=innerWidth<640,canvas=document.getElementById('bg3d');
  let renderer;try{renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});}catch(e){canvas.style.display='none';return;}
  renderer.setPixelRatio(Math.min(devicePixelRatio,mobile?1.5:2));renderer.setSize(innerWidth,innerHeight);
  const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);camera.position.z=18;
  function glow(){const c=document.createElement('canvas');c.width=c.height=64;const g=c.getContext('2d');
    const gr=g.createRadialGradient(32,32,0,32,32,32);gr.addColorStop(0,'rgba(255,255,255,1)');gr.addColorStop(.4,'rgba(120,220,255,.6)');gr.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gr;g.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
  const TEX=glow(),N=mobile?55:120,pos=new Float32Array(N*3),spd=[];
  for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*44;pos[i*3+1]=(Math.random()-.5)*30;pos[i*3+2]=(Math.random()-.5)*30;spd.push(.01+Math.random()*.04);}
  const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({size:mobile?.5:.4,map:TEX,color:0x33d6ee,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:.85}));
  scene.add(pts);
  let mx=0,my=0;addEventListener('pointermove',e=>{mx=e.clientX/innerWidth-.5;my=e.clientY/innerHeight-.5;},{passive:true});
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  function loop(){requestAnimationFrame(loop);
    for(let i=0;i<N;i++){pos[i*3+2]+=spd[i]*.5;if(pos[i*3+2]>16)pos[i*3+2]=-16;}
    geo.attributes.position.needsUpdate=true;pts.rotation.y+=.0005;
    camera.position.x+=((mx*4)-camera.position.x)*.04;camera.position.y+=((-my*3)-camera.position.y)*.04;camera.lookAt(0,0,0);
    renderer.render(scene,camera);}
  loop();
})();

<script>
/* ===== 底部台北天際線(單一簡筆線條 + 拖曳軌跡光點)===== */
(function(){
  const svg=document.getElementById('citysvg');if(!svg)return;
  const NS='http://www.w3.org/2000/svg';

  function seeded(seed){let s=seed;return function(){s=(s*9301+49297)%233280;return s/233280;};}

  // 通用填充樓群(鋸齒天際線)
  function filler(pts,x0,x1,base,H,rnd){
    if(x1<=x0)return;
    const bw=Math.max(10,(x1-x0)/Math.max(2,Math.round((x1-x0)/26)));
    let x=x0;
    while(x<x1-2){
      const w=Math.min(bw*(0.7+rnd()*0.6),x1-x);
      const h=H*(0.06+rnd()*0.16);
      pts.push([x,base]);pts.push([x,base-h]);pts.push([x+w,base-h]);pts.push([x+w,base]);
      x+=w;
    }
    pts.push([x1,base]);
  }
  // 台北101(分節收分塔身)
  function taipei101(pts,cx,base,H){
    const w=H*0.30,segH=H*0.085,tiers=6;let x0=cx-w/2,x1=cx+w/2,y=base;
    pts.push([x0,base]);
    const inset=w*0.09;
    for(let i=0;i<tiers;i++){
      y-=segH;
      pts.push([x0,y]);pts.push([x1,y]);
      x0+=inset*0.5;x1-=inset*0.5;
      pts.push([x1,y]);
    }
    y-=segH*0.9;pts.push([cx,y]); // 收尖前
    pts.push([cx,y-segH*0.6]); // 尖頂
    pts.push([cx,base-1]);
    pts.push([cx+w/2,base]);
  }
  // 圓山大飯店(疊層廡殿頂剪影)
  function grandHotel(pts,cx,base,H){
    const w=H*0.30,bodyH=H*0.18;
    const x0=cx-w/2,x1=cx+w/2;
    pts.push([x0,base]);pts.push([x0,base-bodyH]);
    const steps=3,stepIn=w*0.14,stepH=H*0.075;
    let lx=x0,ly=base-bodyH;
    for(let i=0;i<steps;i++){lx+=stepIn;pts.push([lx,ly]);ly-=stepH;pts.push([lx,ly]);}
    pts.push([cx,ly-stepH*1.3]); // 頂脊尖
    let rx=x1,ry=base-bodyH;
    const rp=[];for(let i=0;i<steps;i++){rx-=stepIn;ry-=stepH;rp.push([rx,ry+stepH],[rx,ry]);}
    rp.reverse().forEach(p=>pts.push(p));
    pts.push([x1,base-bodyH]);pts.push([x1,base]);
  }
  // 斜張橋(簡筆橋塔+纜索)
  function bridge(pts,cx,base,H){
    const deckY=base-H*0.05,towerH=H*0.30,w=H*0.34;
    pts.push([cx-w/2,base]);pts.push([cx-w/2,deckY]);
    pts.push([cx-w*0.06,deckY]);pts.push([cx,base-towerH]); // 左纜索上塔
    pts.push([cx+w*0.06,deckY]);
    pts.push([cx+w/2,deckY]);pts.push([cx+w/2,base]);
  }
  // 摩天輪(多邊形近似圓,底部支架)
  function ferrisWheel(pts,cx,base,H){
    const R=H*0.16,cy=base-R-H*0.03,sides=14;
    pts.push([cx-H*0.05,base]);pts.push([cx-R*0.7,cy+R*0.7]);
    for(let i=0;i<=sides;i++){
      const a=(i/sides)*Math.PI*2 - Math.PI/2;
      pts.push([cx+Math.cos(a)*R,cy+Math.sin(a)*R]);
    }
    pts.push([cx+R*0.7,cy+R*0.7]);pts.push([cx+H*0.05,base]);
  }

  function build(){
    const W=innerWidth,H=Math.min(innerHeight*0.22,190);
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
    const base=H*0.86;
    const rnd=seeded(42);
    let pts=[[-4,base]];
    const marks=[
      {f:grandHotel, x:W*0.13},
      {f:bridge,     x:W*0.34},
      {f:ferrisWheel,x:W*0.58},
      {f:taipei101,  x:W*0.82},
    ];
    let cursor=0;
    marks.forEach(m=>{
      const half=H*0.17;
      filler(pts,cursor,m.x-half,base,H,rnd);
      m.f(pts,m.x,base,H);
      cursor=m.x+half;
    });
    filler(pts,cursor,W+4,base,H,rnd);
    pts.push([W+4,base]);

    // 組 path 'd' 字串 + 累積長度(供拖曳軌跡使用,不依賴瀏覽器 API)
    let d='M'+pts[0][0].toFixed(1)+','+pts[0][1].toFixed(1);
    let total=0;const cum=[0];
    for(let i=1;i<pts.length;i++){
      d+=' L'+pts[i][0].toFixed(1)+','+pts[i][1].toFixed(1);
      total+=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);
      cum.push(total);
    }
    while(svg.firstChild)svg.removeChild(svg.firstChild);
    // 地平線(底線)
    const ground=document.createElementNS(NS,'line');
    ground.setAttribute('x1',0);ground.setAttribute('y1',base);ground.setAttribute('x2',W);ground.setAttribute('y2',base);
    ground.setAttribute('class','grnd');svg.appendChild(ground);
    // 建築簡筆線條
    const p1=document.createElementNS(NS,'path');p1.setAttribute('d',d);p1.setAttribute('class','bld');svg.appendChild(p1);
    // 拖曳軌跡(移動亮段沿線跑)
    const segLen=Math.max(40,total*0.05);
    const p2=document.createElementNS(NS,'path');p2.setAttribute('d',d);p2.setAttribute('class','trail');
    p2.setAttribute('stroke-dasharray',segLen+' '+total);
    p2.setAttribute('stroke-dashoffset',String(total+segLen));
    const anim=document.createElementNS(NS,'animate');
    anim.setAttribute('attributeName','stroke-dashoffset');
    anim.setAttribute('values',(total+segLen)+';'+(-segLen));
    anim.setAttribute('dur','18s');anim.setAttribute('repeatCount','indefinite');
    p2.appendChild(anim);svg.appendChild(p2);
  }
  build();
  let rt=null;addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(build,200);});
})();
</script>
</body>
