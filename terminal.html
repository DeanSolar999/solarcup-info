<title>SOLAR CUP TWO ｜ 作戰終端</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{--void:#03060d;--field:#22d3ee;--field2:#1de9b6;--accent:#c77dff;--core:#eafcff;--ink:#dbeafe;--dim:#5b7089;--line:rgba(29,233,182,.16)}
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--void);color:var(--ink);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;
    background-image:radial-gradient(ellipse 70% 55% at 50% 0%,rgba(34,211,238,.10),transparent 60%)}
  #bg3d{position:fixed;inset:0;z-index:0;display:block}
  .hz{position:fixed;z-index:2;width:110px;height:9px;pointer-events:none;opacity:.4;
    background:repeating-linear-gradient(45deg,var(--field2) 0 8px,#03060d 8px 20px)}
  .hz.tl{top:0;left:0}.hz.tr{top:0;right:0}.hz.bl{bottom:0;left:0}.hz.br{bottom:0;right:0}

  .shell{position:relative;z-index:5;max-width:1080px;margin:0 auto;padding:44px 20px 70px}
  header{text-align:center;margin-bottom:40px}
  .eye{font-size:10px;letter-spacing:.34em;color:var(--field);display:inline-flex;align-items:center;gap:9px}
  .eye .pip{width:7px;height:7px;background:var(--field);box-shadow:0 0 10px var(--field);
    clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);animation:pip 1.3s infinite}
  @keyframes pip{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
  h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:var(--fs-h1);line-height:.92;
    color:var(--core);letter-spacing:.02em;margin-top:12px;text-shadow:0 0 30px rgba(34,211,238,.5),0 0 60px rgba(168,85,247,.22)}
  h1 .f{background:linear-gradient(120deg,var(--field),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .zh{font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(14px,3vw,20px);letter-spacing:.28em;color:var(--accent);margin-top:10px}
  .meta{font-size:10px;letter-spacing:.16em;color:var(--dim);margin-top:14px;line-height:1.9}
  .meta b{color:var(--field)}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:14px}
  .tile{position:relative;display:block;text-decoration:none;color:inherit;overflow:hidden;
    border:1px solid var(--line);background:rgba(8,14,24,.62);backdrop-filter:blur(2px);padding:24px 22px 22px;
    border-radius:6px;transition:.28s;min-height:186px}
  .tile::before{content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;
    background-image:linear-gradient(var(--tl) 1px,transparent 1px),linear-gradient(90deg,var(--tl) 1px,transparent 1px);
    background-size:26px 26px;-webkit-mask-image:radial-gradient(ellipse 90% 80% at 80% 20%,#000,transparent 75%);
    mask-image:radial-gradient(ellipse 90% 80% at 80% 20%,#000,transparent 75%)}
  .tile{--sweep-c:var(--tc)}
  .tile:hover{border-color:var(--tc);box-shadow:0 0 30px var(--tg);transform:translateY(-3px)}
  .tnum{position:absolute;top:16px;right:18px;font-family:'Orbitron',sans-serif;font-weight:900;font-size:13px;color:var(--tc);opacity:.7}
  .ticon{width:46px;height:46px;margin-bottom:16px;position:relative;z-index:1}
  .ticon svg{width:100%;height:100%;overflow:visible;filter:drop-shadow(0 0 7px var(--tg))}
  .ten{font-size:9px;letter-spacing:.2em;color:var(--tc);position:relative;z-index:1}
  .tname{font-family:'Orbitron',sans-serif;font-weight:900;font-size:20px;color:var(--core);margin-top:6px;position:relative;z-index:1}
  .tdesc{font-size:10.5px;color:var(--dim);line-height:1.7;margin-top:9px;position:relative;z-index:1}
  .tgo{margin-top:14px;font-size:9.5px;letter-spacing:.14em;color:var(--tc);position:relative;z-index:1;display:flex;align-items:center;gap:6px}
  .tgo .arw{transition:.25s}
  .tile:hover .tgo .arw{transform:translateX(4px)}

  footer{margin-top:40px;text-align:center;font-size:9.5px;letter-spacing:.14em;color:var(--dim);line-height:2.1}
  footer .demo{color:var(--accent)}
  @media(max-width:600px){.hz{width:70px}.shell{padding:34px 16px 60px}}

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* 背景 3D 光子流 */
(function(){
  if(!window.THREE)return;
  const mobile=innerWidth<600,canvas=document.getElementById('bg3d');
  let renderer;try{renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});}catch(e){canvas.style.display='none';return;}
  renderer.setPixelRatio(Math.min(devicePixelRatio,mobile?1.5:2));renderer.setSize(innerWidth,innerHeight);
  const scene=new THREE.Scene(),camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);camera.position.z=18;
  function glow(){const c=document.createElement('canvas');c.width=c.height=64;const g=c.getContext('2d');
    const gr=g.createRadialGradient(32,32,0,32,32,32);gr.addColorStop(0,'rgba(255,255,255,1)');gr.addColorStop(.35,'rgba(150,220,255,.7)');gr.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gr;g.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
  const TEX=glow(),N=mobile?70:150,pos=new Float32Array(N*3),spd=[],colArr=new Float32Array(N*3);
  const cols=[[0.13,0.83,0.92],[0.11,0.91,0.71],[0.78,0.49,1]];
  for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*44;pos[i*3+1]=(Math.random()-.5)*30;pos[i*3+2]=(Math.random()-.5)*30;spd.push(.01+Math.random()*.04);
    const c=cols[i%3];colArr[i*3]=c[0];colArr[i*3+1]=c[1];colArr[i*3+2]=c[2];}
  const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('color',new THREE.BufferAttribute(colArr,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({size:mobile?.5:.42,map:TEX,vertexColors:true,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:.9}));
  scene.add(pts);
  const lpos=[];for(let i=0;i<N;i+=2)lpos.push(pos[i*3],pos[i*3+1],pos[i*3+2],pos[(i+1)*3],pos[(i+1)*3+1],pos[(i+1)*3+2]);
  const lgeo=new THREE.BufferGeometry();lgeo.setAttribute('position',new THREE.Float32BufferAttribute(lpos,3));
  const lines=new THREE.LineSegments(lgeo,new THREE.LineBasicMaterial({color:0x22d3ee,transparent:true,opacity:.06,blending:THREE.AdditiveBlending}));scene.add(lines);
  let mx=0,my=0;addEventListener('pointermove',e=>{mx=e.clientX/innerWidth-.5;my=e.clientY/innerHeight-.5;},{passive:true});
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  function loop(){requestAnimationFrame(loop);
    for(let i=0;i<N;i++){pos[i*3+2]+=spd[i]*.48;if(pos[i*3+2]>16)pos[i*3+2]=-16;}
    geo.attributes.position.needsUpdate=true;pts.rotation.y+=.0006;lines.rotation.y=pts.rotation.y;
    camera.position.x+=((mx*4)-camera.position.x)*.04;camera.position.y+=((-my*3)-camera.position.y)*.04;camera.lookAt(0,0,0);
    renderer.render(scene,camera);}
  loop();
})();
</script>
